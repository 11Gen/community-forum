server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/community_forum?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: Y29tbXVuaXR5LWZvcnVtLWp3dC1zZWNyZXQta2V5LTIwMjQtZm9yLXNwcmluZy1ib290LXByb2plY3Q=
  expiration: 86400000

file:
  upload:
    path: ./uploads/
